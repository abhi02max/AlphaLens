name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Root Dependencies
      run: npm ci

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

    # In the future, we will add test steps here
    # - name: Run Backend Tests
    #   run: npm test
    # - name: Run Frontend Tests
    #   working-directory: ./frontend
    #   run: npm test

  # Deployment is currently handled automatically by Vercel and Render
  # based on GitHub pushes to the main branch.
  # Future configuration could trigger deployments manually via webhooks here.
